plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services'
}

android {
    namespace 'com.boss.kredit.penjaga'
    compileSdk 33

    defaultConfig {
        applicationId "com.boss.kredit.penjaga"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'com.google.firebase:firebase-messaging:23.1.0'
}
