plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services'
}

android {
    namespace 'com.boss.kredit.penjaga'
    compileSdk 33

    defaultConfig {
        applicationId "com.boss.kredit.penjaga"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    // Pakai versi yang lebih stabil ini, Boss
    implementation 'com.google.firebase:firebase-messaging:23.4.0'
}
